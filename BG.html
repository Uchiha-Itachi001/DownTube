<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TubeDown PRO — Hero</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body {
  background: #080c09;
  font-family: 'Outfit', sans-serif;
  color: #f1f5f1;
  min-height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ══════════════════════════════════════
   BACKGROUND LAYERS
══════════════════════════════════════ */

/* Layer 1 — Deep radial base glow */
.bg-base {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(20,83,45,0.55) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 20% 80%, rgba(15,60,30,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 90%, rgba(10,40,20,0.25) 0%, transparent 60%),
    #080c09;
  z-index: 0;
}

/* Layer 2 — Animated grid lines */
.bg-grid {
  position: fixed; inset: 0; z-index: 1;
  background-image:
    linear-gradient(rgba(34,197,94,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,197,94,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 30%, transparent 100%);
  animation: gridDrift 20s linear infinite;
}
@keyframes gridDrift {
  0%   { background-position: 0 0; }
  100% { background-position: 60px 60px; }
}

/* Layer 3 — Scan lines (CRT-style subtle) */
.bg-scan {
  position: fixed; inset: 0; z-index: 2;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.08) 3px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
}

/* Layer 4 — Floating orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 1;
  animation: orbFloat linear infinite;
}
.orb-1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(34,197,94,0.18) 0%, transparent 70%);
  top: -180px; left: 50%; transform: translateX(-50%);
  animation: orb1pulse 8s ease-in-out infinite;
}
.orb-2 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(20,184,116,0.1) 0%, transparent 70%);
  bottom: 10%; left: 8%;
  animation: orb2float 12s ease-in-out infinite;
}
.orb-3 {
  width: 250px; height: 250px;
  background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 70%);
  bottom: 5%; right: 10%;
  animation: orb3float 15s ease-in-out infinite;
}
@keyframes orb1pulse {
  0%,100% { opacity:1; transform:translateX(-50%) scale(1); }
  50%      { opacity:.7; transform:translateX(-50%) scale(1.15); }
}
@keyframes orb2float {
  0%,100% { transform: translate(0,0); }
  50%     { transform: translate(30px,-40px); }
}
@keyframes orb3float {
  0%,100% { transform: translate(0,0); }
  50%     { transform: translate(-20px,-30px); }
}

/* Layer 5 — Animated particle dots */
.particles {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: rgba(34,197,94,0.6);
  animation: particleRise linear infinite;
}
@keyframes particleRise {
  0%   { opacity: 0; transform: translateY(0) scale(0); }
  10%  { opacity: 1; }
  90%  { opacity: .3; }
  100% { opacity: 0; transform: translateY(-120vh) scale(1.5); }
}

/* Layer 6 — Top beam / light shaft */
.beam {
  position: fixed;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 2px; height: 100%;
  background: linear-gradient(180deg,
    rgba(34,197,94,0.6) 0%,
    rgba(34,197,94,0.15) 20%,
    transparent 60%
  );
  z-index: 2;
  filter: blur(1px);
  animation: beamPulse 4s ease-in-out infinite;
}
.beam-wide {
  position: fixed;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 600px; height: 50%;
  background: linear-gradient(180deg,
    rgba(34,197,94,0.07) 0%,
    transparent 100%
  );
  clip-path: polygon(48% 0%, 52% 0%, 100% 100%, 0% 100%);
  z-index: 1;
  animation: beamPulse 4s ease-in-out infinite;
}
@keyframes beamPulse {
  0%,100% { opacity: 1; }
  50%     { opacity: 0.5; }
}

/* Layer 7 — Corner vignette */
.vignette {
  position: fixed; inset: 0; z-index: 3;
  background: radial-gradient(ellipse 100% 100% at 50% 50%,
    transparent 40%, rgba(0,0,0,0.7) 100%
  );
  pointer-events: none;
}

/* Layer 8 — Noise grain */
.noise {
  position: fixed; inset: 0; z-index: 4; pointer-events: none; opacity: .025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ══════════════════════════════════════
   FLOATING HEXAGON DECORATIONS
══════════════════════════════════════ */
.hex-ring {
  position: fixed; z-index: 2; pointer-events: none;
  opacity: 0.07;
  border: 1px solid rgba(34,197,94,1);
  border-radius: 50%;
  animation: hexSpin linear infinite;
}
.hex-ring-1 {
  width: 700px; height: 700px;
  top: 50%; left: 50%;
  transform: translate(-50%,-55%);
  animation-duration: 60s;
}
.hex-ring-2 {
  width: 500px; height: 500px;
  top: 50%; left: 50%;
  transform: translate(-50%,-55%);
  animation-duration: 40s;
  animation-direction: reverse;
  opacity: 0.04;
  border-style: dashed;
}
@keyframes hexSpin {
  from { transform: translate(-50%,-55%) rotate(0deg); }
  to   { transform: translate(-50%,-55%) rotate(360deg); }
}

/* ══════════════════════════════════════
   CONTENT
══════════════════════════════════════ */
.hero {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  padding: 40px 24px 120px;
  width: 100%; max-width: 780px;
}

.powered-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(34,197,94,0.1);
  border: 1px solid rgba(34,197,94,0.25);
  border-radius: 99px; padding: 6px 16px;
  font-size: 11px; font-weight: 600;
  color: #4ade80; letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 28px;
  animation: fadeUp .8s ease both;
}
.pp-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #22c55e; box-shadow: 0 0 8px #22c55e;
  animation: dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%     { opacity:.5; transform:scale(.75); }
}

.hero-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: clamp(36px, 6vw, 64px);
  line-height: 1.1; margin-bottom: 16px;
  animation: fadeUp .8s .1s ease both;
}
.hero-title .accent {
  color: #22c55e;
  text-shadow: 0 0 40px rgba(34,197,94,0.5);
}

.hero-desc {
  font-size: 15px; color: #6b7280;
  line-height: 1.7; margin-bottom: 36px;
  animation: fadeUp .8s .2s ease both;
}

/* URL BAR */
.url-bar {
  display: flex; align-items: center; gap: 0;
  background: rgba(17,20,16,0.85);
  border: 1px solid rgba(34,197,94,0.2);
  border-radius: 14px; padding: 6px 6px 6px 18px;
  width: 100%; max-width: 620px;
  backdrop-filter: blur(20px);
  box-shadow: 0 0 0 1px rgba(34,197,94,0.05), 0 8px 40px rgba(0,0,0,0.5);
  margin-bottom: 18px;
  animation: fadeUp .8s .3s ease both;
  transition: border-color .3s, box-shadow .3s;
}
.url-bar:focus-within {
  border-color: rgba(34,197,94,0.45);
  box-shadow: 0 0 0 3px rgba(34,197,94,0.08), 0 8px 40px rgba(0,0,0,0.5);
}
.url-icon { font-size: 16px; margin-right: 12px; color: #374151; flex-shrink:0; }
.url-input {
  flex: 1; background: none; border: none; outline: none;
  color: #f1f5f1; font-family: 'Outfit', sans-serif; font-size: 14px;
}
.url-input::placeholder { color: #374151; }
.paste-btn {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
  color: #6b7280; border-radius: 9px; padding: 8px 16px;
  font-size: 13px; font-weight: 500; font-family: 'Outfit', sans-serif;
  cursor: pointer; transition: all .2s; margin-right: 6px;
}
.paste-btn:hover { color: #d1d5db; background: rgba(255,255,255,0.08); }
.analyze-btn {
  background: #22c55e; color: #000; border: none;
  border-radius: 10px; padding: 10px 22px;
  font-size: 13px; font-weight: 700; font-family: 'Syne', sans-serif;
  cursor: pointer; letter-spacing: .3px;
  box-shadow: 0 0 20px rgba(34,197,94,0.4), 0 4px 12px rgba(0,0,0,0.3);
  transition: all .2s; display: flex; align-items: center; gap: 6px;
}
.analyze-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 0 32px rgba(34,197,94,0.5), 0 6px 20px rgba(0,0,0,0.4);
}
.analyze-btn::before { content: '✦'; font-size: 12px; }

/* FEATURE PILLS */
.feat-row {
  display: flex; gap: 8px; flex-wrap: wrap;
  justify-content: center; margin-bottom: 0;
  animation: fadeUp .8s .4s ease both;
}
.feat-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(17,20,16,0.7);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px; padding: 7px 14px;
  font-size: 12.5px; color: #6b7280;
  cursor: pointer; transition: all .25s;
  backdrop-filter: blur(10px);
}
.feat-pill:hover {
  border-color: rgba(34,197,94,0.3);
  color: #4ade80; background: rgba(34,197,94,0.07);
}
.feat-pill.active {
  border-color: rgba(34,197,94,0.4);
  color: #22c55e; background: rgba(34,197,94,0.1);
}

/* PLATFORM BAR */
.platform-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  display: flex; align-items: center; gap: 12px;
  background: rgba(10,14,10,0.85);
  border-top: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  padding: 14px 28px;
}
.pb-label { font-size: 12.5px; color: #374151; margin-right: 4px; }
.pb-icon {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  transition: transform .2s, border-color .2s;
}
.pb-icon:hover { transform: scale(1.15); border-color: rgba(34,197,94,0.3); }
.pb-yt  { background: rgba(255,0,0,0.12); border-color: rgba(255,0,0,0.2); }
.pb-fb  { background: rgba(24,119,242,0.12); border-color: rgba(24,119,242,0.2); }
.pb-ig  { background: rgba(225,48,108,0.12); border-color: rgba(225,48,108,0.2); }
.pb-more { margin-left: auto; font-size: 12px; color: #374151; }

@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

/* Data stream lines */
.data-line {
  position: fixed; z-index: 2; pointer-events: none;
  width: 1px;
  background: linear-gradient(180deg, transparent, rgba(34,197,94,0.4), transparent);
  animation: dataStream linear infinite;
}
@keyframes dataStream {
  0%   { transform: translateY(-100%); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: .5; }
  100% { transform: translateY(200vh); opacity: 0; }
}
</style>
</head>
<body>

<!-- ── BACKGROUND LAYERS ── -->
<div class="bg-base"></div>
<div class="bg-grid"></div>
<div class="bg-scan"></div>
<div class="beam-wide"></div>
<div class="beam"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="hex-ring hex-ring-1"></div>
<div class="hex-ring hex-ring-2"></div>
<div class="vignette"></div>
<div class="noise"></div>

<!-- Particles -->
<div class="particles" id="particles"></div>
<!-- Data streams -->
<div class="data-lines" id="dataLines"></div>

<!-- ── HERO CONTENT ── -->
<div class="hero">
  <div class="powered-pill">
    <div class="pp-dot"></div>
    Powered by YT-DLP · Open Source
  </div>

  <h1 class="hero-title">
    Download <span class="accent">Anything</span><br>
    from the Internet
  </h1>

  <p class="hero-desc">
    Paste any video or audio URL to start.<br>
    Supports YouTube, Twitch, Vimeo, TikTok and 1000+ more sites.
  </p>

  <div class="url-bar">
    <span class="url-icon">🔗</span>
    <input class="url-input" placeholder="Paste video URL from YouTube, Vimeo, Twitch..."/>
    <button class="paste-btn">Paste</button>
    <button class="analyze-btn">ANALYZE</button>
  </div>

  <div class="feat-row">
    <div class="feat-pill active">🎬 Up to 8K</div>
    <div class="feat-pill">🎵 MP3 / WAV</div>
    <div class="feat-pill">📄 MP4 / MKV</div>
    <div class="feat-pill">📋 Batch Mode</div>
    <div class="feat-pill">⚡ Ultra Fast</div>
  </div>
</div>

<!-- ── PLATFORM BAR ── -->
<div class="platform-bar">
  <span class="pb-label">Works with</span>
  <div class="pb-icon pb-yt">▶</div>
  <div class="pb-icon pb-fb" style="font-size:13px;font-weight:700;color:#60a5fa;">f</div>
  <div class="pb-icon pb-ig">📷</div>
  <div class="pb-icon" style="background:rgba(0,0,0,.3);border-color:#333;">♪</div>
  <div class="pb-icon" style="background:rgba(100,65,165,.15);border-color:rgba(100,65,165,.3);font-size:11px;font-weight:700;color:#a78bfa;">tv</div>
  <div class="pb-icon" style="background:rgba(255,0,0,.12);border-color:rgba(255,0,0,.15);">▶</div>
  <div class="pb-icon" style="background:rgba(255,255,255,.04);">🎵</div>
  <span class="pb-more">1000+ platforms</span>
</div>

<script>
// Generate floating particles
const pContainer = document.getElementById('particles');
for (let i = 0; i < 35; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    left: ${Math.random()*100}%;
    bottom: -10px;
    width: ${Math.random() > .7 ? 3 : 2}px;
    height: ${Math.random() > .7 ? 3 : 2}px;
    opacity: ${.3 + Math.random()*.7};
    animation-duration: ${6 + Math.random()*14}s;
    animation-delay: ${-Math.random()*14}s;
  `;
  pContainer.appendChild(p);
}

// Generate data stream lines
const dlContainer = document.getElementById('dataLines');
for (let i = 0; i < 6; i++) {
  const line = document.createElement('div');
  line.className = 'data-line';
  const h = 80 + Math.random() * 200;
  line.style.cssText = `
    left: ${10 + Math.random()*80}%;
    height: ${h}px;
    animation-duration: ${8 + Math.random()*12}s;
    animation-delay: ${-Math.random()*20}s;
    opacity: ${.3 + Math.random()*.4};
  `;
  dlContainer.appendChild(line);
}

// Feature pill toggle
document.querySelectorAll('.feat-pill').forEach(p => {
  p.addEventListener('click', () => p.classList.toggle('active'));
});
</script>
</body>
</html>
